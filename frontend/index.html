<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MY Finanzas</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #3a2010;
        color: #F0EDD5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        text-align: center;
        padding: 3rem 4rem;
        background: #5C3318;
        border-radius: 1rem;
        border: 1px solid #8C5E38;
        box-shadow: 0 25px 50px rgba(0,0,0,.5);
      }
      .logo { font-size: 2.5rem; font-weight: 900; color: #C99828; margin-bottom: .25rem; letter-spacing: -.02em; }
      .logo span { color: #F0EDD5; }
      h2 { font-size: 1rem; font-weight: 400; color: #c9b89a; margin-bottom: 1.5rem; }
      p  { color: #c9b89a; font-size: .9rem; line-height: 1.6; }
      code { background: #3D5C1A; color: #F0EDD5; padding: .1em .4em; border-radius: .25rem; font-size: .85em; }
      .badge {
        display: inline-block;
        margin-top: 1.5rem;
        padding: .3rem .9rem;
        background: #C99828;
        color: #3a2010;
        border-radius: 999px;
        font-size: .75rem;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="logo"><span>MY</span> Finanzas</div>
      <h2>Tu gestor financiero familiar</h2>
      <p>El panel está en construcción.<br>La API está disponible en <code>/api/health</code>.</p>
      <span class="badge">Fase 1 — Fundación</span>
    </div>
  </body>
</html>
